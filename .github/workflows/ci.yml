name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require archived plan on shipping PRs
        if: github.event_name == 'pull_request'
        run: ./scripts/check_plan_archived.sh ${{ github.event.pull_request.base.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: backend
        run: pytest -q --cov-report=term-missing --cov-fail-under=83
